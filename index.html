<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp 2.0 - Red & Black Edition</title>
    <style>
        * { box-sizing: border-box; }
        /* Sfondo principale nero assoluto */
        body { font-family: 'Segoe UI', Helvetica, sans-serif; margin: 0; background-color: #000000; color: #e9edef; overflow: hidden; height: 100vh; }
        
        /* Header: Nero con accenti rossi */
        .header { background-color: #121212; padding: 15px 15px 0 15px; position: relative; z-index: 10; border-bottom: 1px solid #330000; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header h1 { color: #ff0000; font-size: 20px; margin: 0; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .tabs { display: flex; justify-content: space-around; color: #8696a0; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .tab { flex: 1; text-align: center; padding-bottom: 10px; border-bottom: 3px solid transparent; }
        /* Tab attiva rossa */
        .tab-active { color: #ff0000; border-bottom: 3px solid #ff0000; }

        /* Contenitore Chat */
        .chat-container { height: calc(100vh - 100px); overflow-y: auto; background-color: #000000; padding-bottom: 80px; }
        .chat-item { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #1a1a1a; }
        .chat-item:active { background-color: #260000; }
        
        /* Avatar con bordo rosso */
        .avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; background-color: #1a1a1a; border: 1px solid #440000; flex-shrink: 0; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 500; font-size: 16px; color: #ffffff; display: block; }
        .chat-msg { font-size: 14px; color: #8696a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

        /* Finestra Chat Fullscreen */
        #chat-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #050505; z-index: 200; flex-direction: column; }
        .chat-header { background: #121212; padding: 10px; display: flex; align-items: center; color: white; border-bottom: 1px solid #330000; }
        .back-btn { font-size: 24px; margin-right: 10px; cursor: pointer; color: #ff0000; padding: 5px; }
        
        /* Area messaggi con un leggero overlay rosso scuro */
        .messages-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .msg { padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; max-width: 85%; font-size: 15px; line-height: 1.4; word-wrap: break-word; white-space: pre-wrap; }
        
        /* Bolle messaggi: Rosso per inviati, Grigio scuro per ricevuti */
        .sent { background: #880000; align-self: flex-end; color: white; }
        .received { background: #262626; align-self: flex-start; color: #e9edef; }
        
        .input-area { background: #121212; padding: 10px; display: flex; align-items: center; border-top: 1px solid #330000; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #330000; padding: 12px; border-radius: 25px; color: white; outline: none; }
        
        /* Bottone invio rosso */
        .send-btn { background: #ff0000; border: none; width: 45px; height: 45px; border-radius: 50%; margin-left: 10px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 10px rgba(255,0,0,0.3); }
        .ticks { color: #ff4d4d; font-size: 10px; margin-left: 5px; }
    </style>
</head>
<body>

<div id="main-ui">
    <div class="header">
        <div class="header-top">
            <h1>WhatsApp 2 <span style="font-size: 10px; vertical-align: middle; color: #ff0000;">RED</span></h1>
            <div style="color: #ff0000; font-size: 18px;">🔍 &nbsp; ⋮</div>
        </div>
        <div class="tabs">
            <div class="tab">📁</div>
            <div class="tab-active">Chat</div>
            <div class="tab">Stato</div>
            <div class="tab">Chiamate</div>
        </div>
    </div>

    <div class="chat-container" id="list-container"></div>
</div>

<div id="chat-window">
    <div class="chat-header">
        <span class="back-btn" onclick="closeChat()">←</span>
        <div class="avatar" id="header-avatar" style="width: 35px; height: 35px; font-size: 16px;"></div>
        <span id="header-name" style="font-weight: bold; margin-left: 10px;"></span>
    </div>
    <div class="messages-area" id="msg-area"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Scrivi un messaggio di sangue...">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
</div>

<script>
    // Database identico al precedente
    const chats = [
        { id: 'mamma', name: 'Mamma CATTIVA', last: 'NIENTE TELEFONO PER 104 ANNI', icon: '👩‍🍳', resp: 'NON mi dispace dirtelo sei nato con un cromosoma in più' },
        { id: 'pesce', name: 'Pesce Rosso CATTIVO', last: 'Glub glub...', icon: '🐠', resp: 'ki te muort me fatt muri e fam e mo t accir' },
        { id: 'classe', name: 'gruppo cattivo CATTIVO', last: 'Quaglietta obbeso: Raga i compiti?', icon: '👨‍🎓', resp: 'visualizzato' },
        { id: 'bibi', name: 'Joker CATTIVO', last: 'Ora NON parlo io', icon: '😲', resp: 'ORA NON parlo io' },
        { id: 'ciccio', name: 'CiccioGamer89 cattivo', last: 'tu NON sei un paguro', icon: '🍔', resp: 'ora faccio la denuncia' },
        { id: 'bossetti', name: 'Massimo Bossetti', last: '#FreeBossetti', icon: '⛓️', resp: 'NON sono innocente giuro' },
        { id: 'hitler', name: 'Adolf hitler', last: 'Heil', icon: '🫡', resp: 'Nein! Lo sapevo che dovevo sterminarli tutti!' },
        { id: 'sal', name: 'Sal Da Vinci', last: 'Sanremo 2026', icon: '🎤', resp: 'Saremo io e te\nPer sempre...' },
        { id: 'gesu', name: 'Gesù', last: 'scusa come mi hai chiamato?', icon: '✝️', resp: 'la prossima volta che mi chiami porco ti scomunico dalla vita' },
        { id: 'giovanni', name: 'giovanni', last: 'io dico...', icon: '🏳️‍🌈', resp: 'sei gay' },
        { id: '', name: 'kebabbaro', last: 'kebab 5€', icon: '🥙', resp: 'niente kebab per te' },
        { id: 'trump', name: 'donald trump', last: 'sono il miglior presidente americano', icon: '🇺🇸', resp: '104 milioni di $ a israele! ciuccio i piedi di Netanyahu' },
    ];

    let currentId = '';

    function renderChats() {
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        chats.forEach(c => {
            container.innerHTML += `
                <div class="chat-item" onclick="openChat('${c.id}')">
                    <div class="avatar">${c.icon}</div>
                    <div class="chat-info">
                        <span class="chat-name">${c.name}</span>
                        <span class="chat-msg">${c.last}</span>
                    </div>
                </div>`;
        });
        container.innerHTML += `<div style="height: 100px;"></div>`;
    }

    function openChat(id) {
        currentId = id;
        const chat = chats.find(c => c.id === id);
        document.getElementById('header-name').innerText = chat.name;
        document.getElementById('header-avatar').innerText = chat.icon;
        document.getElementById('msg-area').innerHTML = `<div class="msg received" style="font-size: 11px; align-self: center; background: #1a1a1a; color: #ff4d4d; border: 1px solid #440000; text-align: center;">Crittografia Infernale WhatsApp 2 Attiva.</div>`;
        document.getElementById('chat-window').style.display = 'flex';
    }

    function closeChat() {
        document.getElementById('chat-window').style.display = 'none';
    }

    function sendMsg() {
        const input = document.getElementById('user-input');
        if(!input.value) return;
        
        appendMsg(input.value, 'sent');
        input.value = '';

        setTimeout(() => {
            const chat = chats.find(c => c.id === currentId);
            if(chat.resp === 'visualizzato') {
                const messages = document.querySelectorAll('.sent');
                const lastSent = messages[messages.length - 1];
                if (!lastSent.innerHTML.includes('ticks')) {
                    lastSent.innerHTML += '<span class="ticks"> ✔✔</span>';
                }
            } else {
                appendMsg(chat.resp, 'received');
            }
        }, 1200);
    }

    function appendMsg(text, type) {
        const area = document.getElementById('msg-area');
        const div = document.createElement('div');
        div.className = 'msg ' + type;
        div.innerText = text;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    window.onload = renderChats;
</script>
</body>
</html>
